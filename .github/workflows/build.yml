name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  native-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  wasm:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-wasm --parallel
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: numbl-allocator-wasm
          path: |
            build-wasm/numbl_allocator.mjs
            build-wasm/numbl_allocator.wasm

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [native-test, wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: numbl-allocator-wasm
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            numbl_allocator.mjs
            numbl_allocator.wasm
